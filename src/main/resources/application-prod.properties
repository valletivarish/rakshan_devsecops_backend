# =============================================
# Production Configuration (AWS EC2 + RDS)
# Activated via: --spring.profiles.active=prod
# =============================================

# =============================================
# RDS PostgreSQL Database Configuration
# Connects to AWS RDS instance in private subnet
# =============================================
spring.datasource.url=jdbc:postgresql://codereview-db.c1eaqskm8i6v.eu-west-1.rds.amazonaws.com:5432/codereview_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / Hibernate Configuration
# update mode auto-creates/updates tables based on entity definitions
# =============================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# =============================================
# Logging Configuration (reduced for production)
# =============================================
logging.level.com.rakshan.codereview=INFO
logging.level.org.springframework.security=WARN
