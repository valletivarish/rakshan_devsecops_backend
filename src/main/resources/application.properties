# =============================================
# Application Configuration
# =============================================
spring.application.name=codereview

# =============================================
# PostgreSQL Database Configuration
# Connects to local PostgreSQL instance for development
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/codereview_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / Hibernate Configuration
# update mode auto-creates/updates tables based on entity definitions
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT Configuration
# Secret key and expiration time for JSON Web Tokens
# =============================================
jwt.secret=Rakshan25180754DecentralisedPeerCodeReviewPlatformSecretKeyForJWT2026
jwt.expiration=86400000

# =============================================
# Server Configuration
# =============================================
server.port=8080

# =============================================
# OpenAPI / Swagger Configuration
# Accessible at /swagger-ui.html
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =============================================
# Logging Configuration
# =============================================
logging.level.com.rakshan.codereview=DEBUG
logging.level.org.springframework.security=DEBUG
