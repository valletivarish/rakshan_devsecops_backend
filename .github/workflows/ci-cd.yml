# CI/CD Pipeline for the Decentralised Peer Code Review Platform - Backend
# This pipeline builds, tests, analyses, and deploys the Spring Boot backend application.
# CI stages run on every push and pull request.
# CD stages (deployment) run only on push to the main branch.

name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ==============================================
  # CI Stage: Build, Test, and Analyse
  # ==============================================
  ci:
    name: CI - Build, Test, and Static Analysis
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code from the repository (fetch-depth 0 required for SonarCloud)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Set up Java 17 (required for Spring Boot 3)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 3: Cache SonarCloud packages for faster analysis
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Step 3: Install dependencies and compile the project
      - name: Build with Maven
        run: mvn clean compile -DskipTests

      # Step 4: Run unit and integration tests with JaCoCo code coverage
      - name: Run tests with coverage
        run: mvn test

      # Step 5: Run SpotBugs static bug detection analysis
      - name: Run SpotBugs analysis
        run: mvn spotbugs:check -DfailOnError=false
        continue-on-error: true

      # Step 6: Run PMD code style and complexity analysis
      - name: Run PMD analysis
        run: mvn pmd:check -DfailOnViolation=false
        continue-on-error: true

      # Step 7: Run OWASP Dependency-Check for security vulnerability scanning
      - name: Run OWASP Dependency-Check
        run: mvn dependency-check:check -DfailBuildOnCVSS=11 -DnvdApiKey=${{ secrets.NVD_API_KEY }}
        continue-on-error: true

      # Step 7b: Run Trivy vulnerability scanner on project dependencies
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          output: 'target/trivy-report.txt'
        continue-on-error: true

      # Step 7c: Run Trivy and generate HTML report for artifact upload
      - name: Generate Trivy HTML report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'template'
          template: '@/contrib/html.tpl'
          output: 'target/trivy-report.html'
          severity: 'CRITICAL,HIGH,MEDIUM'
        continue-on-error: true

      # Step 8: Generate JaCoCo code coverage report
      - name: Generate JaCoCo report
        run: mvn jacoco:report

      # Step 9: Run SonarCloud comprehensive code quality and security analysis
      # Skips OWASP dependency-check during verify to prevent NVD API failures from blocking SonarCloud
      - name: Run SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=decentralised-peer-code-review -Ddependency-check.skip=true
        continue-on-error: true

      # Step 10: Package the application as a JAR file
      - name: Package application
        run: mvn package -DskipTests

      # Step 10: Upload SpotBugs analysis report as CI artifact
      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugs/

      # Step 11: Upload PMD analysis report as CI artifact
      - name: Upload PMD report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: target/pmd*

      # Step 12: Upload OWASP Dependency-Check report as CI artifact
      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/dependency-check/

      # Step 13: Upload Trivy security scan report as CI artifact
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: |
            target/trivy-report.txt
            target/trivy-report.html

      # Step 14: Upload JaCoCo code coverage report as CI artifact
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # Step 14: Upload the built JAR file as CI artifact for deployment
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar

  # ==============================================
  # CD Stage: Deploy to AWS EC2
  # Runs only on push to main branch (not on PRs)
  # ==============================================
  cd:
    name: CD - Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Step 1: Download the built JAR artifact from the CI stage
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./target

      # Step 2: Deploy JAR to EC2 instance via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop existing application process if running
            sudo systemctl stop codereview || true
            # Create application directory if it does not exist
            mkdir -p /home/ubuntu/app
            # The JAR will be transferred via SCP in a separate step

      # Step 3: Copy JAR file to EC2 via SCP
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app/"
          strip_components: 1

      # Step 4: Start the application on EC2
      - name: Start application on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Start the Spring Boot application using systemd
            sudo systemctl restart codereview
            # Wait for the application to start
            sleep 30

      # Step 5: Smoke test - verify the application is running by hitting the health endpoint
      - name: Smoke test - Health check
        run: |
          curl -f http://${{ secrets.EC2_HOST }}:8080/api/health || exit 1
          echo "Health check passed - backend is running"
